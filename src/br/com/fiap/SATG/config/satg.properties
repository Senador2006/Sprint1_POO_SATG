# Limites de vegetação (cm) — ajuste sem recompilar
limite.baixa=10
limite.media=20
limite.alta=30

# Simulação: quantas rodadas (dias) executar
simulacao.rodadas=3
# Se true, ao início de cada rodada após a 1ª, equipes ocupadas são liberadas (trabalho concluído)
simulacao.liberarEquipesEntreRodadas=true

# Onde gravar CSVs de estado e relatórios (relativo ao diretório de trabalho)
diretorio.dados=data
# Nome base dos relatórios (.txt e .csv são acrescentados)
relatorio.base=relatorio_monitoramento
